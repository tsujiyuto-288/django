<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Django勉強</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-secondary-subtle">
    <div class="container py-5">
      <div
        class="mb-4 border-bottom border-dark pb-2 d-flex justify-content-between align-items-center"
      >
        <h1 class="text-primary">{{ page_title }}</h1>
        <div class="d-flex gap-4">
          {% if page_title == "勉強場1"%}
          <a href="{% url 'test2_open' %}" class="btn btn-primary">勉強場2へ</a>
          <a href="{% url 'test3_open' %}" class="btn btn-primary">勉強場3へ</a>
          <a href="{% url 'mypage_open' %}" class="btn btn-primary"
            >マイページへ</a
          >
          {% elif page_title == "勉強場2"%}
          <a href="{% url 'test_open' %}" class="btn btn-primary">勉強場1へ</a>
          <a href="{% url 'test3_open' %}" class="btn btn-primary">勉強場3へ</a>
          <a href="{% url 'mypage_open' %}" class="btn btn-primary"
            >マイページへ</a
          >
          {% elif page_title == "勉強場3"%}
          <a href="{% url 'test_open' %}" class="btn btn-primary">勉強場1へ</a>
          <a href="{% url 'test2_open' %}" class="btn btn-primary">勉強場2へ</a>
          <a href="{% url 'mypage_open' %}" class="btn btn-primary"
            >マイページへ</a
          >
          {% endif %}
        </div>
      </div>
      <!-- prettier-ignore -->
      {% block content %} {% endblock %}
    </div>
  </body>
</html>

<script
  src="https://code.jquery.com/jquery-3.7.1.js"
  integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
  crossorigin="anonymous"
></script>
<!-- Bootstrap JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
  crossorigin="anonymous"
></script>

<script>
  //共通のjsの処理を書く
</script>

<!-- prettier-ignore -->
{% block js_content %} {% endblock %}
